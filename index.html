<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women's Day Poster Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:linear-gradient(135deg,#ff4d94,#8a2be2);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
width:95%;
max-width:900px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

h1{
text-align:center;
font-weight:700;
margin-bottom:20px;
}

.main{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.controls{
flex:1;
min-width:200px;
}

.controls button,
.upload-btn{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

button{
background:white;
color:#333;
}

button:hover{
transform:scale(1.03);
}

.upload-btn{
background:#ff4d94;
color:white;
text-align:center;
}

.canvas-box{
flex:2;
position:relative;
}

canvas{
width:100%;
border-radius:15px;
background:#eee;
cursor:grab;
}

.download{
background:#28a745;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>🌸 Women's Day Poster Generator</h1>

<div class="main">

<div class="controls">

<input type="file" id="upload" accept="image/*" hidden>

<div class="upload-btn" onclick="document.getElementById('upload').click()">
Upload Photo
</div>

<button onclick="zoomIn()">Zoom In</button>
<button onclick="zoomOut()">Zoom Out</button>
<button onclick="rotateLeft()">Rotate Left</button>
<button onclick="rotateRight()">Rotate Right</button>
<button onclick="resetImage()">Reset</button>

<button class="download" onclick="downloadPoster()">
Download Poster
</button>

</div>


<div class="canvas-box">

<canvas id="canvas"></canvas>

</div>

</div>
</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=1080;
canvas.height=1080;

let userImg=null;

const template=new Image();
template.crossOrigin="anonymous";

/* REPLACE WITH YOUR WOMENS DAY FRAME */
template.src="https://i.postimg.cc/J0S0RNzQ/EDC-Template-Spons.png";


let transform={
x:540,
y:540,
scale:1,
rotation:0
};


function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* draw template background */

ctx.drawImage(template,0,0,canvas.width,canvas.height);

/* draw user image */

if(userImg){

ctx.save();

ctx.translate(transform.x,transform.y);

ctx.rotate(transform.rotation);

ctx.scale(transform.scale,transform.scale);

ctx.drawImage(userImg,-userImg.width/2,-userImg.height/2);

ctx.restore();

}

/* women's day text */

ctx.fillStyle="white";
ctx.font="bold 70px Poppins";
ctx.textAlign="center";
ctx.fillText("Happy Women's Day",540,120);

ctx.font="28px Poppins";
ctx.fillText("Empowering Women • Empowering World",540,170);

}


document.getElementById("upload").addEventListener("change",function(e){

const file=e.target.files[0];

const reader=new FileReader();

reader.onload=function(event){

userImg=new Image();

userImg.src=event.target.result;

userImg.onload=function(){

const scaleX=canvas.width/userImg.width;
const scaleY=canvas.height/userImg.height;

transform.scale=Math.min(scaleX,scaleY);

draw();

};

};

reader.readAsDataURL(file);

});


function zoomIn(){

transform.scale*=1.1;
draw();

}

function zoomOut(){

transform.scale*=0.9;
draw();

}

function rotateLeft(){

transform.rotation-=0.1;
draw();

}

function rotateRight(){

transform.rotation+=0.1;
draw();

}

function resetImage(){

transform={
x:540,
y:540,
scale:1,
rotation:0
};

draw();

}


/* drag image */

let dragging=false;

let startX,startY;

canvas.addEventListener("mousedown",e=>{

dragging=true;

startX=e.offsetX-transform.x;

startY=e.offsetY-transform.y;

});

canvas.addEventListener("mousemove",e=>{

if(!dragging)return;

transform.x=e.offsetX-startX;

transform.y=e.offsetY-startY;

draw();

});

canvas.addEventListener("mouseup",()=>dragging=false);

canvas.addEventListener("mouseleave",()=>dragging=false);



function downloadPoster(){

const link=document.createElement("a");

link.download="womens-day-poster.png";

link.href=canvas.toDataURL();

link.click();

}



template.onload=draw;

</script>

</body>
</html>

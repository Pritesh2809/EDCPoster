<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women's Day Poster Generator</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"><style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#ff4d94,#8a2be2);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
color:white;
}

.container{
width:100%;
max-width:900px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border-radius:20px;
padding:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

h1{
text-align:center;
font-weight:700;
margin-bottom:20px;
font-size:26px;
}

.main{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.controls{
flex:1;
min-width:200px;
}

.controls button,
.upload{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
font-size:14px;
}

.upload{
background:#ff4d94;
color:white;
text-align:center;
}

button{
background:white;
color:#333;
}

button:hover{
transform:scale(1.03);
}

.download{
background:#28a745;
color:white;
}

.canvas-box{
flex:2;
position:relative;
}

canvas{
width:100%;
border-radius:15px;
background:#eee;
touch-action:none;
cursor:grab;
}

/* Mobile optimization */

@media(max-width:768px){

.main{
flex-direction:column;
}

h1{
font-size:22px;
}

}

</style></head><body><div class="container"><h1>🌸 Women's Day Poster Generator</h1><div class="main"><div class="controls"><input type="file" id="upload" hidden accept="image/*"><div class="upload" onclick="document.getElementById('upload').click()">
Upload Photo
</div><button onclick="zoomIn()">Zoom In</button>
<button onclick="zoomOut()">Zoom Out</button>
<button onclick="rotateLeft()">Rotate Left</button>
<button onclick="rotateRight()">Rotate Right</button>
<button onclick="resetImage()">Reset</button>

<button class="download" onclick="downloadPoster()">Download Poster</button>

</div><div class="canvas-box">
<canvas id="canvas"></canvas>
</div></div>
</div><script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=1080;
canvas.height=1080;

let userImg=null;

const template=new Image();
template.crossOrigin="anonymous";
template.src="https://i.postimg.cc/43R9WC8Q/20260308-084457.png";

let transform={
x:540,
y:540,
scale:1,
rotation:0
};

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* draw user photo */

if(userImg){

ctx.save();

ctx.translate(transform.x,transform.y);
ctx.rotate(transform.rotation);
ctx.scale(transform.scale,transform.scale);

ctx.drawImage(userImg,-userImg.width/2,-userImg.height/2);

ctx.restore();

}

/* draw frame */

ctx.drawImage(template,0,0,canvas.width,canvas.height);

}

document.getElementById("upload").addEventListener("change",function(e){

const file=e.target.files[0];

const reader=new FileReader();

reader.onload=function(event){

userImg=new Image();
userImg.src=event.target.result;

userImg.onload=function(){

const scaleX=canvas.width/userImg.width;
const scaleY=canvas.height/userImg.height;

transform.scale=Math.min(scaleX,scaleY);

draw();

};

};

reader.readAsDataURL(file);

});


function zoomIn(){
transform.scale*=1.1;
draw();
}

function zoomOut(){
transform.scale*=0.9;
draw();
}

function rotateLeft(){
transform.rotation-=0.1;
draw();
}

function rotateRight(){
transform.rotation+=0.1;
draw();
}

function resetImage(){

transform={
x:540,
y:540,
scale:1,
rotation:0
};

draw();

}


/* Dragging */

let dragging=false;
let startX,startY;

canvas.addEventListener("mousedown",e=>{

dragging=true;

startX=e.offsetX-transform.x;
startY=e.offsetY-transform.y;

});

canvas.addEventListener("mousemove",e=>{

if(!dragging)return;

transform.x=e.offsetX-startX;
transform.y=e.offsetY-startY;

draw();

});

canvas.addEventListener("mouseup",()=>dragging=false);
canvas.addEventListener("mouseleave",()=>dragging=false);


/* Touch support for mobile */

canvas.addEventListener("touchstart",e=>{

const rect=canvas.getBoundingClientRect();

const x=(e.touches[0].clientX-rect.left)*(canvas.width/rect.width);
const y=(e.touches[0].clientY-rect.top)*(canvas.height/rect.height);

dragging=true;

startX=x-transform.x;
startY=y-transform.y;

});

canvas.addEventListener("touchmove",e=>{

if(!dragging)return;

const rect=canvas.getBoundingClientRect();

const x=(e.touches[0].clientX-rect.left)*(canvas.width/rect.width);
const y=(e.touches[0].clientY-rect.top)*(canvas.height/rect.height);

transform.x=x-startX;
transform.y=y-startY;

draw();

});

canvas.addEventListener("touchend",()=>dragging=false);


/* Download */

function downloadPoster(){

const link=document.createElement("a");

link.download="womens-day-poster.png";
link.href=canvas.toDataURL("image/png");

link.click();

}

template.onload=draw;

</script></body>
</html>
